<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PincelNet - Lobby</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="container lobby-wrapper">
    <div class="lobby-title">PincelNet 🎨</div>
    <p style="color: var(--text-muted); margin-bottom: 30px;">Proyecto Distribuido - Pinturillo</p>

    <form method="POST" id="lobby-form">
        <div class="form-group">
            <label for="player_name">Nickname del Jugador</label>
            <input 
                type="text" 
                id="player_name"
                name="player_name" 
                class="input-custom" 
                placeholder="Ej. Juanito_Pro" 
                required
            >
        </div>

        <div class="form-group">
            <label for="room_id">Código de Sala</label>
            <input 
                type="text" 
                id="room_id"
                name="room_id" 
                class="input-custom" 
                placeholder="Ej. Sala_Calculo" 
                required
            >
        </div>

        <button type="submit" class="btn-primary" style="margin-top: 10px;">
            Ingresar al Juego
        </button>
    </form>

    <div class="rooms-section">
        <h3 style="margin-top: 0; text-align: left; color: var(--accent-success);">Salas Activas en el Servidor</h3>
        <ul class="room-list">
            {% for room in rooms %}
                <li class="room-item" style="display: flex; justify-content: space-between; align-items: center; padding: 10px; background: #2a2c41; margin-bottom: 5px; border-radius: 4px;">
                    <span style="color: var(--accent-color); font-weight: bold;">{{ room }}</span>
                    
                    <button 
                        type="button" 
                        class="btn-primary" 
                        style="padding: 4px 10px; font-size: 0.8rem; border: none; cursor: pointer;"
                        onclick="enviarFormularioASala('{{ url_for('game_bp.game', room_id=room) }}', '{{ room }}')"
                    >
                        Unirse
                    </button>
                </li>
            {% else %}
                <li class="room-item" style="color: var(--text-muted); font-size: 0.9rem;">
                    No hay salas públicas. Crea una ingresando un código arriba.
                </li>
            {% endfor %}
        </ul>
    </div>
</div>

<script>
function enviarFormularioASala(urlDestino, roomId) {
    const playerNameInput = document.getElementById('player_name');
    const roomIdInput = document.getElementById('room_id');
    const form = document.getElementById('lobby-form');

    // Validar si el usuario escribió su nombre. Si está vacío, le pide que lo rellene.
    if (!playerNameInput.value.trim()) {
        playerNameInput.reportValidity(); 
        return;
    }

    // Colocamos el nombre de la sala seleccionada en el input de arriba 
    // para que el atributo 'required' no bloquee el envío.
    roomIdInput.value = roomId;

    // Cambiamos dinámicamente la dirección a donde se enviará el formulario
    form.action = urlDestino;

    // Enviamos el formulario por método POST hacia la ruta del juego
    form.submit();
}
</script>

</body>
</html>
