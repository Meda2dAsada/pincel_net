# alembic.ini — configuración de migraciones
# Corre: alembic upgrade head   para crear/actualizar las tablas en HeidiSQL

[alembic]
script_location = migrations
prepend_sys_path = .

# URL de conexión — debe coincidir con database.py
sqlalchemy.url = mysql+pymysql://root:@127.0.0.1:3306/guessing_game

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S